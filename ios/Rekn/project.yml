name: Rekn
options:
  bundleIdPrefix: com.beckermathie
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Rekn:
    type: application
    platform: iOS
    sources:
      - Rekn
    info:
      path: Rekn/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beckermathie.rekn
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"

  ReknTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ReknTests
    dependencies:
      - target: Rekn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beckermathie.rekn.tests

  ReknUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ReknUITests
    dependencies:
      - target: Rekn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beckermathie.rekn.uitests
